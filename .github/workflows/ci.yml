name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
      - run: pip install ruff mypy
      - run: python -m ruff check src/ --select=E,F,I,N,W --ignore=F841
      - run: python -m mypy src/ --ignore-missing-imports --follow-imports=silent

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run core tests
        run: |
          python -m pytest tests/test_tokenizer_and_model.py::test_bpe_tokenizer_round_trip -v
          python -m pytest tests/test_tokenizer_and_model.py::test_rms_norm_and_swiglu_shapes -v
          python -m pytest tests/test_tokenizer_and_model.py::test_tiny_transformer_forward_shape -v
        timeout-minutes: 5

  import-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Verify all modules import
        run: |
          python -c "
          from src.config.settings import get_settings
          from src.context.manager import ContextManager
          from src.memory.store import MemoryStore
          from src.rag.embedder import OllamaEmbedder
          from src.rag.loader import DocumentLoader
          from src.rag.vector_store import VectorStore
          from src.rag.retriever import RAGRetriever
          from src.tools.registry import ToolRegistry, get_default_registry
          from src.tools.calculator import calculator
          from src.monitor.stats import UsageTracker, RequestRecord
          from src.guard.filter import ContentFilter, PIIFilter, RateLimiter
          from src.mcp.client import MCPClient, MCPToolAdapter
          from src.agent.planner import AgentPlanner, TaskPlan, TaskStep
          print('All modules imported successfully')
          "
