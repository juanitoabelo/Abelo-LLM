version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  llm-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - ENABLE_RAG=true
      - ENABLE_TOOLS=true
      - ENABLE_MEMORY=true
      - ENABLE_AGENT=true
      - ENABLE_VISION=true
      - ENABLE_VOICE=false
      - ENABLE_KNOWLEDGE_GRAPH=true
      - LOG_LEVEL=INFO
    volumes:
      - llm_data:/app/data
      - llm_checkpoints:/app/checkpoints
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - llm-server
    restart: unless-stopped

volumes:
  ollama_data:
  llm_data:
  llm_checkpoints:
