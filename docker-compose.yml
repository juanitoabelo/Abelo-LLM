version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  llm:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - LLM_DEFAULT_MODEL=qwen3.5:latest
      - ENABLE_RAG=true
      - ENABLE_TOOLS=true
      - ENABLE_MEMORY=true
      - EMBEDDING_MODEL=nomic-embed-text
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./artifacts:/app/artifacts
      - rag_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/models/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      llm:
        condition: service_healthy

volumes:
  ollama_data:
  rag_data:
