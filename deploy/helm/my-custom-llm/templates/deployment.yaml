apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "my-custom-llm.name" . }}
  labels:
    {{- include "my-custom-llm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "my-custom-llm.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "my-custom-llm.name" . }}
    spec:
      containers:
      - name: server
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8000
        env:
        - name: OLLAMA_HOST
          value: "http://ollama:11434"
        - name: SERVER_HOST
          value: "0.0.0.0"
        - name: SERVER_PORT
          value: "8000"
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
