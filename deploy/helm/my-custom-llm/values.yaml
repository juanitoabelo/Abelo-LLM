replicaCount: 2
image:
  repository: my-custom-llm
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ollama:
  image: ollama/ollama:latest
  storageSize: 20Gi
  resources:
    requests:
      memory: 4Gi
      cpu: 1
    limits:
      memory: 16Gi
      cpu: 4

ingress:
  enabled: true
  host: llm.example.com
  className: nginx

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: 500m
