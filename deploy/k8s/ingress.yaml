apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-custom-llm
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: llm.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-custom-llm
            port:
              number: 8000
